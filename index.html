<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RentalRev</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0D0F14;--surf:#141720;--surf2:#1C2030;--bdr:#252A3A;--txt:#E8EAF0;--mut:#6B7280;--acc:#4F9EFF;--gld:#F5C842;--grn:#34D399;--red:#F87171;--pur:#A78BFA}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--surf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;padding:24px 0}
.logo{padding:0 20px 20px;border-bottom:1px solid var(--bdr);margin-bottom:14px}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700}
.logo-sub{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-top:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;font-weight:500;color:var(--mut);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--txt);background:var(--surf2)}
.nav-item.active{color:var(--acc);border-left-color:var(--acc);background:rgba(79,158,255,.07)}
.sidebar-footer{margin-top:auto;padding:16px 20px;border-top:1px solid var(--bdr)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);margin-right:6px}
.dot.red{background:var(--red)}.dot.ylw{background:var(--gld)}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.page-title{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600}
.page-sub{font-size:12px;color:var(--mut);margin-top:2px}
.content{padding:24px 28px;flex:1}
.connect-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center}
.connect-card{background:var(--surf);border:1px solid var(--bdr);border-radius:16px;padding:36px 40px;width:460px;max-width:95vw}
.connect-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:700;text-align:center;margin-bottom:8px}
.connect-sub{font-size:13px;color:var(--mut);text-align:center;margin-bottom:24px;line-height:1.6}
.btn{padding:10px 20px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-acc{background:var(--acc);color:#0D1B2E}.btn-acc:hover{background:#6AABFF}.btn-acc:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--mut)}.btn-ghost:hover{color:var(--txt);border-color:var(--txt)}
.btn-sm{padding:6px 13px;font-size:12px}.btn-full{width:100%;justify-content:center}
.btn-red{background:rgba(248,113,113,.12);border:1px solid var(--red);color:var(--red)}
.btn-grn{background:rgba(52,211,153,.12);border:1px solid var(--grn);color:var(--grn)}
.inp{width:100%;padding:11px 14px;background:var(--surf2);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:14px;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--acc)}.inp-sm{padding:8px 11px;font-size:13px;margin-bottom:0}
.lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin-bottom:5px;display:block}
.card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;margin-bottom:18px}
.card-head{padding:14px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.card-body{padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat-card{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden}
.stat-glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.1;filter:blur(20px)}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;line-height:1}
.stat-delta{font-size:11px;color:var(--mut);margin-top:5px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut);padding:9px 12px;text-align:left;border-bottom:1px solid var(--bdr)}
td{padding:11px 12px;font-size:13px;border-bottom:1px solid var(--bdr);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surf2)}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-grn{background:rgba(52,211,153,.15);color:var(--grn)}.b-blu{background:rgba(79,158,255,.15);color:var(--acc)}
.b-gld{background:rgba(245,200,66,.15);color:var(--gld)}.b-red{background:rgba(248,113,113,.15);color:var(--red)}.b-mut{background:var(--surf2);color:var(--mut)}
.plat{display:inline-flex;align-items:center;gap:5px;font-size:12px}.pdot{width:8px;height:8px;border-radius:50%}
.p-airbnb{background:#FF5A5F}.p-vrbo{background:#1DABD4}.p-direct{background:var(--grn)}.p-booking{background:#3B82F6}
.alert{padding:11px 14px;border-radius:8px;font-size:13px;margin-bottom:12px;display:flex;gap:9px;align-items:flex-start;line-height:1.5}
.a-blu{background:rgba(79,158,255,.09);border:1px solid rgba(79,158,255,.25)}
.a-ylw{background:rgba(245,200,66,.09);border:1px solid rgba(245,200,66,.25)}
.a-grn{background:rgba(52,211,153,.09);border:1px solid rgba(52,211,153,.25)}
.a-red{background:rgba(248,113,113,.09);border:1px solid rgba(248,113,113,.25)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:10px}
.cal-hdr{font-size:10px;font-weight:700;text-align:center;color:var(--mut);padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;position:relative}
.c-av{background:var(--surf2);color:var(--mut)}.c-bk{background:rgba(79,158,255,.2);color:var(--acc)}.c-bl{background:rgba(248,113,113,.15);color:var(--red)}.c-td{box-shadow:0 0 0 2px var(--gld)}
.bar-wrap{margin-bottom:14px}.bar-row{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:4px}
.bar-track{height:5px;background:var(--bdr);border-radius:3px}.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.tgl-wrap{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.tgl{width:42px;height:23px;border-radius:12px;background:var(--bdr);border:none;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--acc)}.tgl::after{content:'';position:absolute;width:17px;height:17px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s}.tgl.on::after{left:22px}
.empty{text-align:center;padding:40px 20px;color:var(--mut)}.empty-icon{font-size:36px;margin-bottom:10px}.empty-title{font-size:15px;font-weight:600;color:var(--txt);margin-bottom:5px}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}.sk{background:var(--surf2);border-radius:6px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bp{background:#FFFDF8;border-radius:10px;overflow:hidden;color:#1A1410;border:2px solid var(--bdr)}
.bp-hero{background:linear-gradient(135deg,#1A2E40,#0D1B2E);padding:24px;color:white;text-align:center}
.bp-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:4px}
.bp-body{padding:22px}.bp-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;margin-bottom:5px}
.bp-inp{width:100%;padding:9px 12px;border:1.5px solid #DDD;border-radius:7px;font-size:13px;margin-bottom:11px;outline:none}
.bp-btn{width:100%;padding:13px;background:#1A2E40;color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer}
.bp-save{background:#E8F5E9;color:#2E7D32;padding:7px 11px;border-radius:6px;font-size:12px;margin-bottom:11px;font-weight:500}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
@media(max-width:768px){.sidebar{display:none}.stat-grid{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="connect-screen">
  <div class="connect-wrap">
    <div class="connect-card">
      <div style="font-size:44px;text-align:center;margin-bottom:14px">&#127968;</div>
      <div class="connect-title">RentalRev</div>
      <div class="connect-sub">Your Hospitable token is stored in Vercel. Click below to load your live data.</div>
      <div class="alert a-grn" style="margin-bottom:20px"><span>&#9989;</span><span>Connected to your Vercel proxy!</span></div>
      <div id="connect-err" class="alert a-red" style="display:none;margin-bottom:14px"><span>&#9888;&#65039;</span><span id="connect-err-msg"></span></div>
      <button class="btn btn-acc btn-full" id="connect-btn" onclick="doConnect()">Load My Hospitable Data</button>
    </div>
  </div>
</div>
<div id="app" style="display:none" class="shell">
  <div class="sidebar">
    <div class="logo"><div class="logo-name">RentalRev</div><div class="logo-sub">Hospitable Live</div></div>
    <button class="nav-item active" onclick="showTab('overview',this)">Overview</button>
    <button class="nav-item" onclick="showTab('reservations',this)">Reservations</button>
    <button class="nav-item" onclick="showTab('calendar',this)">Calendar</button>
    <button class="nav-item" onclick="showTab('properties',this)">Properties</button>
    <button class="nav-item" onclick="showTab('direct',this)">Direct Booking</button>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;margin-bottom:8px"><span class="dot" id="status-dot"></span><span style="font-size:11px;color:var(--mut)" id="status-txt">Connected</span></div>
      <div style="font-size:10px;color:var(--mut);margin-bottom:10px" id="sync-time"></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-ghost btn-sm" onclick="loadData()">Refresh</button>
        <button class="btn btn-red btn-sm" onclick="disconnect()">Disconnect</button>
      </div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div><div class="page-title" id="page-title">Overview</div><div class="page-sub" id="page-sub">Live data from Hospitable</div></div>
      <div style="display:flex;gap:8px">
        <span class="badge" id="prop-count" style="background:rgba(167,139,250,.15);color:var(--pur)">- properties</span>
        <span class="badge b-blu" id="res-count">- reservations</span>
      </div>
    </div>
    <div class="content">
      <div id="err-banner" class="alert a-red" style="display:none;margin-bottom:18px"><span>&#9888;</span><span id="err-msg"></span><button onclick="loadData()" style="margin-left:auto;background:none;border:none;color:var(--red);cursor:pointer;text-decoration:underline;font-size:13px">retry</button></div>
      <div id="tab-overview"></div>
      <div id="tab-reservations" style="display:none"></div>
      <div id="tab-calendar" style="display:none"></div>
      <div id="tab-properties" style="display:none"></div>
      <div id="tab-direct" style="display:none"></div>
    </div>
  </div>
</div>
<script>
var STATE={properties:[],reservations:[],calData:[],selProp:null,calMonth:new Date().getMonth(),calYear:new Date().getFullYear()};
var MS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var MF=["January","February","March","April","May","June","July","August","September","October","November","December"];
var DS=["Su","Mo","Tu","We","Th","Fr","Sa"];
function api(path,opts){
  opts=opts||{};
  return fetch("/api/hospitable?url="+encodeURIComponent(path),Object.assign({},opts,{headers:Object.assign({"Accept":"application/json","Content-Type":"application/json"},opts.headers||{})}))
  .then(function(r){return r.json().then(function(d){if(!r.ok)throw new Error(d.message||d.error||"HTTP "+r.status);return d;});});
}
var g=function(id){return document.getElementById(id);};
function money(n){return n==null?"--":"$"+Number(n).toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0});}
function fdate(d){if(!d)return"--";var dt=new Date(d);return MS[dt.getMonth()]+" "+dt.getDate()+", "+dt.getFullYear();}
function nights(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function pcls(p){return({airbnb:"p-airbnb",vrbo:"p-vrbo",direct:"p-direct",booking:"p-booking"})[String(p).toLowerCase()]||"p-direct";}
function rbadge(s){return({accepted:"b-grn",pending:"b-gld",cancelled:"b-red",inquiry:"b-blu",declined:"b-red"})[s]||"b-mut";}
function doConnect(){
  var btn=g("connect-btn");btn.disabled=true;btn.textContent="Connecting...";g("connect-err").style.display="none";
  loadData().then(function(){g("connect-screen").style.display="none";g("app").style.display="flex";}).catch(function(e){g("connect-err-msg").textContent="Could not connect: "+e.message;g("connect-err").style.display="flex";btn.disabled=false;btn.textContent="Load My Hospitable Data";});
}
function disconnect(){STATE={properties:[],reservations:[],calData:[],selProp:null,calMonth:new Date().getMonth(),calYear:new Date().getFullYear()};g("app").style.display="none";g("connect-screen").style.display="block";}
function loadData(){
  setStatus("loading");
  return Promise.all([api("/v2/properties?per_page=50"),api("/v2/reservations?per_page=100&include=guest,financials,properties")])
  .then(function(results){
    STATE.properties=results[0].data||[];STATE.reservations=results[1].data||[];
    if(STATE.properties.length&&!STATE.selProp)STATE.selProp=STATE.properties[0];
    g("prop-count").textContent=STATE.properties.length+" propert"+(STATE.properties.length===1?"y":"ies");
    g("res-count").textContent=STATE.reservations.length+" reservations";
    g("sync-time").textContent="Synced "+new Date().toLocaleTimeString();
    setStatus("ok");renderCurrentTab();
  }).catch(function(e){setStatus("error");showErr(e.message);throw e;});
}
function setStatus(s){var dot=g("status-dot");var txt=g("status-txt");if(!dot)return;dot.className="dot"+(s==="error"?" red":s==="loading"?" ylw":"");txt.textContent=s==="error"?"Error":s==="loading"?"Syncing":"Connected";}
function showErr(msg){g("err-banner").style.display="flex";g("err-msg").textContent=msg;}
function hideErr(){g("err-banner").style.display="none";}
var currentTab="overview";
var TAB_META={overview:["Overview","Live data from Hospitable"],reservations:["Reservations","All bookings"],calendar:["Calendar","View availability"],properties:["Properties","Your listings"],direct:["Direct Booking","Fee-free bookings"]};
function showTab(name,el){document.querySelectorAll(".nav-item").forEach(function(b){b.classList.remove("active");});el.classList.add("active");["overview","reservations","calendar","properties","direct"].forEach(function(t){g("tab-"+t).style.display=t===name?"block":"none";});currentTab=name;g("page-title").textContent=TAB_META[name][0];g("page-sub").textContent=TAB_META[name][1];renderCurrentTab();}
function renderCurrentTab(){hideErr();if(currentTab==="overview")renderOverview();else if(currentTab==="reservations")renderReservations();else if(currentTab==="calendar")renderCalendar();else if(currentTab==="properties")renderProperties();else if(currentTab==="direct")renderDirect();}
function renderOverview(){
  var R=STATE.reservations,P=STATE.properties;
  var acc=R.filter(function(r){return r.status==="accepted";});
  var rev=acc.reduce(function(s,r){return s+((r.financials&&r.financials.total_host_payout)||0);},0);
  var avgN=acc.length?Math.round(acc.reduce(function(s,r){return s+nights(r.arrival_date,r.departure_date);},0)/acc.length):0;
  var upc=acc.filter(function(r){return new Date(r.arrival_date)>new Date();}).length;
  var pc={};R.forEach(function(r){var p=r.platform||"direct";pc[p]=(pc[p]||0)+1;});
  var stats=[[money(rev),acc.length+" confirmed","Total Revenue","#4F9EFF"],[P.length,"Connected listings","Properties","#A78BFA"],[upc,"Future bookings","Upcoming","#F5C842"],[avgN+"n","Avg nights","Avg Stay","#34D399"]];
  var html='<div class="stat-grid">'+stats.map(function(s){return'<div class="stat-card"><div class="stat-glow" style="background:'+s[3]+'"></div><div class="stat-lbl">'+s[2]+'</div><div class="stat-val" style="color:'+s[3]+'">'+s[0]+'</div><div class="stat-delta">'+s[1]+'</div></div>';}).join("")+'</div>';
  html+='<div class="g2"><div class="card"><div class="card-head"><div class="card-title">Recent Reservations</div></div>';
  if(R.length===0){html+='<div class="empty"><div class="empty-icon">&#128197;</div><div class="empty-title">No reservations found</div></div>';}
  else{html+='<table><thead><tr><th>Guest</th><th>Dates</th><th>Platform</th><th>Status</th></tr></thead><tbody>'+R.slice(0,8).map(function(r){return'<tr><td style="font-weight:500">'+(r.guest&&(r.guest.name||r.guest.first_name)||"Guest")+'</td><td style="color:var(--mut);font-size:12px">'+fdate(r.arrival_date)+" to "+fdate(r.departure_date)+'</td><td><span class="plat"><span class="pdot '+pcls(r.platform)+'"></span>'+(r.platform||"direct")+'</span></td><td><span class="badge '+rbadge(r.status)+'">'+r.status+'</span></td></tr>';}).join("")+'</tbody></table>';}
  html+='</div><div class="card"><div class="card-head"><div class="card-title">Booking Sources</div></div><div class="card-body">';
  var entries=Object.entries(pc);
  if(entries.length===0){html+='<p style="color:var(--mut);font-size:13px">No data yet</p>';}
  else{entries.forEach(function(e){var pl=e[0],ct=e[1];var pct=Math.round(ct/R.length*100);var col=pl==="airbnb"?"#FF5A5F":pl==="vrbo"?"#1DABD4":"var(--grn)";html+='<div class="bar-wrap"><div class="bar-row"><span>'+pl+'</span><span>'+ct+' ('+pct+'%)</span></div><div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div></div>';});}
  html+='<div class="alert a-ylw" style="margin-top:10px"><span>&#128161;</span><div>Use <strong>Direct Booking</strong> to keep 100% of your rate.</div></div></div></div></div>';
  g("tab-overview").innerHTML=html;
}
var resFilter="all";
function renderReservations(f){
  if(f)resFilter=f;
  var R=STATE.reservations;var fr=resFilter==="all"?R:R.filter(function(r){return r.status===resFilter;});
  var html='<div style="display:flex;gap:8px;margin-bottom:18px">'+["all","accepted","pending","cancelled"].map(function(s){var cnt=s==="all"?R.length:R.filter(function(r){return r.status===s;}).length;return'<button class="btn btn-sm '+(resFilter===s?"btn-acc":"btn-ghost")+'" onclick="renderReservations(\'+\''+s+\''+\')">'+s.charAt(0).toUpperCase()+s.slice(1)+" ("+cnt+")</button>";}).join("")+'</div><div class="card">';
  if(fr.length===0){html+='<div class="empty"><div class="empty-icon">&#128269;</div><div class="empty-title">No '+resFilter+' reservations</div></div>';}
  else{html+='<table><thead><tr><th>Guest</th><th>Property</th><th>Check-in</th><th>Check-out</th><th>Nights</th><th>Payout</th><th>Status</th></tr></thead><tbody>'+fr.map(function(r){var prop=(r.properties&&r.properties[0]&&r.properties[0].name)||(r.property&&r.property.name)||"--";var pay=r.financials&&r.financials.total_host_payout?money(r.financials.total_host_payout):"--";return'<tr><td style="font-weight:500">'+(r.guest&&(r.guest.name||r.guest.first_name)||"--")+'</td><td style="font-size:12px;color:var(--mut)">'+prop+'</td><td style="font-size:12px">'+fdate(r.arrival_date)+'</td><td style="font-size:12px">'+fdate(r.departure_date)+'</td><td><span class="badge b-mut">'+nights(r.arrival_date,r.departure_date)+'n</span></td><td style="color:var(--grn);font-weight:600">'+pay+'</td><td><span class="badge '+rbadge(r.status)+'">'+r.status+'</span></td></tr>';}).join("")+'</tbody></table>';}
  html+='</div>';g("tab-reservations").innerHTML=html;
}
function renderCalendar(){
  var P=STATE.properties,sel=STATE.selProp,mo=STATE.calMonth,yr=STATE.calYear;
  var fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),today=new Date();
  var calMap={};STATE.calData.forEach(function(d){calMap[d.date]=d;});
  var cells=DS.map(function(d){return'<div class="cal-hdr">'+d+'</div>';}).join("");
  for(var i=0;i<fd;i++)cells+='<div></div>';
  for(var d=1;d<=dim;d++){var ds=yr+"-"+String(mo+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");var ent=calMap[ds];var isT=today.getDate()===d&&today.getMonth()===mo&&today.getFullYear()===yr;var cls=ent&&ent.status==="booked"?"c-bk":ent&&ent.status==="blocked"?"c-bl":"c-av";var price=ent&&ent.price?'<span style="position:absolute;bottom:1px;left:0;right:0;text-align:center;font-size:7px;color:var(--gld);font-weight:700">$'+ent.price+'</span>':"";cells+='<div class="cal-cell '+cls+(isT?" c-td":"")+'" title="'+ds+'">'+d+price+'</div>';}
  var priceInputs="";var upcomingDays=[];for(var i=0;i<6;i++){var dt=new Date(yr,mo,today.getDate()+i+1);if(dt.getMonth()===mo){var ds2=dt.toISOString().split("T")[0];var ex=calMap[ds2]&&calMap[ds2].price;priceInputs+='<div style="background:var(--surf2);border-radius:8px;padding:12px;border:1px solid var(--bdr)"><div style="font-size:11px;color:var(--mut);margin-bottom:6px">'+fdate(ds2)+'</div><div style="display:flex;gap:6px"><input class="inp inp-sm" id="price-'+ds2+'" placeholder="'+(ex?"$"+ex:"Rate")+'"/><button class="btn btn-grn btn-sm" onclick="savePrice(''+ds2+'')">Save</button></div></div>';}}
  var html='<div id="cal-save-msg"></div><div class="card"><div class="card-head"><div class="card-title">'+(sel&&sel.name||"Calendar")+'</div><div style="display:flex;align-items:center;gap:10px"><button class="btn btn-ghost btn-sm" onclick="calNav(-1)">prev</button><span style="font-size:14px;font-weight:600;min-width:120px;text-align:center">'+MF[mo]+" "+yr+'</span><button class="btn btn-ghost btn-sm" onclick="calNav(1)">next</button></div></div><div class="card-body"><div class="cal-grid">'+cells+'</div></div></div>';
  html+='<div class="card"><div class="card-head"><div class="card-title">Update Pricing</div></div><div class="card-body"><div class="g3">'+priceInputs+'</div></div></div>';
  g("tab-calendar").innerHTML=html;if(sel)loadCalendar();
}
function loadCalendar(){
  var sel=STATE.selProp;if(!sel)return;
  var mo=STATE.calMonth,yr=STATE.calYear;
  var s=yr+"-"+String(mo+1).padStart(2,"0")+"-01";
  var e=yr+"-"+String(mo+1).padStart(2,"0")+"-"+new Date(yr,mo+1,0).getDate();
  api("/v2/properties/"+sel.id+"/calendar?start_date="+s+"&end_date="+e).then(function(d){STATE.calData=d.data||[];renderCalendar();}).catch(function(){STATE.calData=[];});
}
function calNav(dir){var mo=STATE.calMonth+dir,yr=STATE.calYear;if(mo>11){mo=0;yr++;}else if(mo<0){mo=11;yr--;}STATE.calMonth=mo;STATE.calYear=yr;STATE.calData=[];renderCalendar();}
function selectProp(id){STATE.selProp=STATE.properties.find(function(p){return p.id===id;});STATE.calData=[];renderCalendar();}
function savePrice(date){
  var inp=document.getElementById("price-"+date);if(!inp||!inp.value)return;
  var price=parseFloat(inp.value.replace(/[^0-9.]/g,""));if(isNaN(price))return;
  var sel=STATE.selProp;if(!sel)return;
  api("/v2/properties/"+sel.id+"/calendar",{method:"PUT",body:JSON.stringify({dates:[{date:date,price:price}]})})
  .then(function(){var msg=document.getElementById("cal-save-msg");msg.innerHTML='<div class="alert a-grn" style="margin-bottom:14px"><span>&#9989;</span> Updated '+date+'!</div>';setTimeout(function(){msg.innerHTML="";},3000);STATE.calData=STATE.calData.map(function(d){return d.date===date?Object.assign({},d,{price:price}):d;});renderCalendar();})
  .catch(function(e){document.getElementById("cal-save-msg").innerHTML='<div class="alert a-red"><span>&#10060;</span> '+e.message+'</div>';});
}
function renderProperties(){
  var P=STATE.properties;
  if(!P.length){g("tab-properties").innerHTML='<div class="empty"><div class="empty-icon">&#127968;</div><div class="empty-title">No properties found</div></div>';return;}
  g("tab-properties").innerHTML='<div class="g2">'+P.map(function(p){var loc=[p.address&&p.address.city,p.address&&p.address.state,p.address&&p.address.country].filter(Boolean).join(", ")||"--";return'<div class="card"><div class="card-head"><div class="card-title">'+p.name+'</div><span class="badge b-grn">Active</span></div><div class="card-body"><table><tbody><tr><td style="color:var(--mut);font-size:11px;width:100px">Location</td><td style="font-size:13px">'+loc+'</td></tr><tr><td style="color:var(--mut);font-size:11px">Bedrooms</td><td style="font-size:13px">'+(p.bedrooms||"--")+'</td></tr><tr><td style="color:var(--mut);font-size:11px">Bathrooms</td><td style="font-size:13px">'+(p.bathrooms||"--")+'</td></tr><tr><td style="color:var(--mut);font-size:11px">Max Guests</td><td style="font-size:13px">'+(p.capacity||"--")+'</td></tr></tbody></table>'+(p.airbnb_listing_id?'<span class="badge b-red" style="margin-top:10px;display:inline-flex">Airbnb</span>':'')+'</div></div>';}).join("")+'</div>';
}
var dbTab="settings";
var dbS={propName:"",headline:"Book Direct and Save",subline:"Skip the fees. Same property, better price.",directRate:180,airbnbRate:220,email:"",phone:"",minNights:2,showSavings:true,contactEnabled:true};
function renderDirect(t){
  if(t)dbTab=t;
  if(!dbS.propName&&STATE.properties.length)dbS.propName=STATE.properties[0]&&STATE.properties[0].name||"My Rental";
  var sv=dbS.airbnbRate-dbS.directRate,sp=Math.round(sv/dbS.airbnbRate*100);
  var tabs='<div style="display:flex;gap:8px;margin-bottom:18px">'+[["settings","Settings"],["preview","Preview"],["embed","Embed Code"]].map(function(x){return'<button class="btn btn-sm '+(dbTab===x[0]?"btn-acc":"btn-ghost")+'" onclick="renderDirect(''+x[0]+'')">'+x[1]+'</button>';}).join("")+'</div>';
  var body="";
  if(dbTab==="settings"){body='<div class="g2"><div class="card"><div class="card-head"><div class="card-title">Page Content</div></div><div class="card-body">'+[["propName","Property Name"],["headline","Headline"],["subline","Sub-headline"],["email","Contact Email"],["phone","Phone"]].map(function(x){return'<div style="margin-bottom:12px"><label class="lbl">'+x[1]+'</label><input class="inp" value="'+dbS[x[0]]+'" onchange="dbU(''+x[0]+'',this.value)" style="margin-bottom:0"/></div>';}).join("")+'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px"><div><label class="lbl">Direct Rate</label><input class="inp" type="number" value="'+dbS.directRate+'" onchange="dbU('directRate',+this.value)" style="margin-bottom:0"/></div><div><label class="lbl">Airbnb Rate</label><input class="inp" type="number" value="'+dbS.airbnbRate+'" onchange="dbU('airbnbRate',+this.value)" style="margin-bottom:0"/></div></div></div></div><div class="card"><div class="card-head"><div class="card-title">Features</div></div><div class="card-body"><div class="tgl-wrap"><div><div style="font-size:13px;font-weight:500">Show Savings Banner</div></div><button class="tgl '+(dbS.showSavings?"on":"")+'" onclick="dbT('showSavings')"></button></div><div class="tgl-wrap"><div><div style="font-size:13px;font-weight:500">Contact Form</div></div><button class="tgl '+(dbS.contactEnabled?"on":"")+'" onclick="dbT('contactEnabled')"></button></div><div class="alert a-grn" style="margin-top:14px"><span>&#128176;</span><div>Guests save <strong>$'+sv+'/night ('+sp+'%)</strong> vs Airbnb.</div></div></div></div></div>';}
  else if(dbTab==="preview"){body='<div style="max-width:440px;margin:0 auto"><div class="bp"><div class="bp-hero"><div style="font-size:11px;opacity:.6;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">'+dbS.propName+'</div><div class="bp-title">'+dbS.headline+'</div><div style="font-size:13px;opacity:.7">'+dbS.subline+'</div></div><div class="bp-body">'+(dbS.showSavings?'<div class="bp-save">Save $'+sv+'/night vs Airbnb!</div>':'')+'<div class="bp-lbl">Check-in</div><input class="bp-inp" type="date"/><div class="bp-lbl">Check-out</div><input class="bp-inp" type="date"/>'+(dbS.contactEnabled?'<div class="bp-lbl">Name</div><input class="bp-inp" placeholder="Full name"/><div class="bp-lbl">Email</div><input class="bp-inp" type="email" placeholder="your@email.com"/>':'')+'<div style="margin-bottom:14px"><div style="font-size:11px;color:#999;text-decoration:line-through">$'+dbS.airbnbRate+'/night on Airbnb</div><div style="font-size:26px;font-weight:700;color:#1A1410">$'+dbS.directRate+'<span style="font-size:13px;font-weight:400">/night</span></div></div><button class="bp-btn">Request to Book Direct</button></div></div></div>';}
  else{body='<div class="card"><div class="card-head"><div class="card-title">Embed Code</div></div><div class="card-body"><div class="alert a-blu" style="margin-bottom:14px"><span>&#8505;&#65039;</span><div>Drop into Squarespace, Wix, Webflow, or any site.</div></div><button class="btn btn-acc" onclick="copyEmbed()">Copy Embed Code</button></div></div>';}
  g("tab-direct").innerHTML=tabs+body;
}
function dbU(k,v){dbS[k]=v;}
function dbT(k){dbS[k]=!dbS[k];renderDirect();}
function copyEmbed(){var sv=dbS.airbnbRate-dbS.directRate;var c='<form action="mailto:'+dbS.email+'" method="post"><input type="date" name="checkin" required/><input type="date" name="checkout" required/><input type="text" name="name" placeholder="Name" required/><input type="email" name="email" placeholder="Email" required/><button type="submit">Book Direct at $'+dbS.directRate+'/night</button></form>';navigator.clipboard&&navigator.clipboard.writeText(c).then(function(){alert("Copied!");}).catch(function(){alert("Could not copy");});}
</script>
</body>
</html>
